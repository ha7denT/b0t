name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  package:
    name: b0tKit build + test
    runs-on: macos-26
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: swift build
        working-directory: b0tKit
        run: swift build -c debug

      - name: swift test
        working-directory: b0tKit
        run: swift test --parallel

  lint:
    name: swift-format lint
    runs-on: macos-26
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: swift-format lint --strict
        run: |
          find b0tApp b0tKit \( -name .build -o -name .swiftpm \) -prune \
            -o -name '*.swift' -print0 \
            | xargs -0 swift format lint --strict --configuration .swift-format
