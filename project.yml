name: b0t

options:
  bundleIdPrefix: com.toppeross
  deploymentTarget:
    iOS: "26.0"
  developmentLanguage: en
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_TREAT_WARNINGS_AS_ERRORS: YES
    GCC_TREAT_WARNINGS_AS_ERRORS: YES
    DEVELOPMENT_TEAM: P2VY4WT259
    CODE_SIGN_STYLE: Automatic

packages:
  b0tKit:
    path: b0tKit

targets:
  b0t:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: b0tApp/Sources
      - path: b0tApp/Resources
      - path: default-bot
        type: folder
        buildPhase: resources
    dependencies:
      - package: b0tKit
        product: b0tCore
      - package: b0tKit
        product: b0tBrain
      - package: b0tKit
        product: b0tModules
      - package: b0tKit
        product: b0tFace
      - package: b0tKit
        product: b0tHome
      - package: b0tKit
        product: b0tAudio
      - package: b0tKit
        product: b0tDesign
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.toppeross.b0t
        INFOPLIST_FILE: b0tApp/Info.plist
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1,2"
        ENABLE_PREVIEWS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_EMIT_LOC_STRINGS: YES
